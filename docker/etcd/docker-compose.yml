services:
  etcd-server:
    image: quay.io/coreos/etcd:v3.5.23
    container_name: etcd-server
    command:
      - /usr/local/bin/etcd
      - --name=etcd-server
      - --data-dir=/var/run/etcd # 🔥 1. 显式指定数据存储目录
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-server:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-server:2380
      - --initial-cluster=etcd-server=http://etcd-server:2380
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - ./data:/var/run/etcd
    networks:
      - etcd-net
    restart: always

networks:
  etcd-net:
    driver: bridge